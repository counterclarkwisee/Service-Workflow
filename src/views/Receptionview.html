<!doctype html>
<html>
  <head>
    <base target="_top" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-blue: #3b82f6;
        --active-teal: #14b8a6;
        --bg-light: #f9fafb;
        --text-main: #374151;
        --text-subtle: #6b7280;
        --border-color: #e5e7eb;
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.1);
      }

      body {
        font-family: "Roboto", sans-serif;
        background-color: var(--bg-light);
        color: var(--text-main);
        margin: 0;
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 25px;
      }

      /* --- HEADER FIX: SIDE BY SIDE --- */
      .reception-header {
        display: flex;
        justify-content: space-between;
        align-items: center; /* Changed to center to prevent vertical stacking */
        width: 100%;
      }

      .greeting {
        flex-shrink: 0;
      }
      .greeting h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 700;
      }
      .greeting p {
        margin: 4px 0 0;
        color: var(--text-subtle);
        font-size: 14px;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 15px;
        flex-shrink: 0;
      }

      .search-input-wrapper {
        position: relative;
        width: 320px; /* Fixed width to prevent squashing */
      }
      .search-input {
        width: 100%;
        padding: 10px 12px 10px 38px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 14px;
        outline: none;
        background: #fff;
      }
      .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0.4;
        pointer-events: none;
      }

      .btn-nav {
        padding: 10px 18px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: #fff;
        color: var(--text-main);
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
        transition: all 0.2s;
        box-shadow: var(--shadow-sm);
      }
      .btn-nav:hover {
        background: #f3f4f6;
        border-color: #d1d5db;
      }

      /* --- METRICS --- */
      .metrics-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }
      .metric-card {
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: var(--shadow-sm);
        border-left: 4px solid #ddd;
      }
      .metric-card.arrived {
        border-left-color: var(--active-teal);
      }
      .metric-title {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-subtle);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .metric-value {
        font-size: 32px;
        font-weight: 700;
        margin: 5px 0;
      }

      /* --- BALANCED GRID --- */
      .checkin-list-wrapper {
        background: #fff;
        border-radius: 12px;
        box-shadow: var(--shadow-md);
        overflow: hidden;
      }

      .recept-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      .recept-table th {
        background: #f3f4f6;
        padding: 16px;
        text-align: left;
        color: var(--text-subtle);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .recept-table td {
        padding: 18px 16px;
        border-bottom: 1px solid var(--border-color);
        vertical-align: middle;
      }

      /* Column Width Logic to pull items inward */
      .w-time {
        width: 10%;
      }
      .w-veh {
        width: 18%;
      }
      .w-cust {
        width: 22%;
      }
      .w-adv {
        width: 15%;
      }
      .w-conf {
        width: 12%;
      }
      .w-act {
        width: 23%;
      }

      .plate-badge {
        background: #eff6ff;
        color: var(--primary-blue);
        padding: 4px 8px;
        border-radius: 6px;
        font-weight: 700;
        font-family: monospace;
        font-size: 13px;
        display: inline-block;
        margin-bottom: 4px;
      }
      .vehicle-model {
        display: block;
        font-size: 11px;
        color: var(--text-subtle);
        text-transform: uppercase;
        font-weight: 500;
      }
      .customer-info {
        font-weight: 700;
        font-size: 14px;
        color: #1f2937;
      }
      .customer-sub {
        font-size: 12px;
        color: var(--text-subtle);
      }

      /* --- CONFIRMATION CHIPS --- */
      .conf-wrapper {
        display: flex;
        gap: 8px;
      }
      .conf-chip {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        font-size: 9px;
        font-weight: 800;
        color: var(--text-subtle);
        background: #fff;
      }
      .conf-chip span {
        font-size: 12px;
        margin-bottom: -1px;
      }
      .conf-done {
        background-color: #ecfdf5;
        border-color: #10b981;
        color: #047857;
      }
      .conf-nr {
        background-color: #fff7ed;
        border-color: #f97316;
        color: #9a3412;
      }

      /* --- ACTION CELL --- */
      .action-cell {
        display: flex;
        align-items: center;
        gap: 15px;
        justify-content: flex-end;
      }
      .radio-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        width: 180px;
      }
      .radio-item {
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        font-size: 10px;
        font-weight: 600;
        color: var(--text-subtle);
        transition: all 0.2s;
      }
      .radio-item.selected {
        border-color: var(--primary-blue);
        background: #eff6ff;
        color: var(--primary-blue);
      }
      .radio-item input {
        margin: 0;
      }

      .btn-confirm-arrival {
        background-color: var(--active-teal);
        color: #fff;
        padding: 10px 14px;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
        transition: opacity 0.2s;
      }
      .btn-confirm-arrival:hover {
        background-color: #0f9b8a;
      }

      #toast {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #1f2937;
        color: #fff;
        padding: 14px 28px;
        border-radius: 8px;
        display: none;
        z-index: 1000;
        box-shadow: var(--shadow-md);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="reception-header">
      <div class="greeting">
        <h1 id="greetingText">Good Morning</h1>
        <p id="currentDateDisplay">Reception Desk Loading...</p>
      </div>
      <div class="header-right">
        <div class="search-input-wrapper">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            class="search-input"
            id="searchBox"
            placeholder="Search plate or name..."
            oninput="filterList()"
          />
        </div>
        <button class="btn-nav" onclick="openAppointmentView()">
          Back to Schedule
        </button>
      </div>
    </div>

    <div class="metrics-container">
      <div class="metric-card">
        <div class="metric-title">Today's Appointments</div>
        <div class="metric-value" id="count-total">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-title">Awaiting</div>
        <div class="metric-value" id="count-pending">0</div>
      </div>
      <div class="metric-card arrived">
        <div class="metric-title" style="color: var(--active-teal)">
          Arrived
        </div>
        <div class="metric-value" id="count-arrived">0</div>
      </div>
    </div>

    <div class="checkin-list-wrapper">
      <table class="recept-table" id="receptTable">
        <thead>
          <tr>
            <th class="w-time">Time</th>
            <th class="w-veh">Vehicle</th>
            <th class="w-cust">Customer</th>
            <th class="w-adv">Advisor</th>
            <th class="w-conf">Confirmation</th>
            <th class="w-act" style="text-align: right">Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="toast">Arrival recorded successfully.</div>

    <script>
      const scriptUrl = "<?= scriptUrl ?>";
      let ALL_DATA = [];

      function openAppointmentView() {
        window.open(scriptUrl, "_top");
      }

      function refreshData() {
        google.script.run.withSuccessHandler(renderList).getState();
      }

      function renderList(state) {
        const today = new Date().toLocaleDateString("en-CA", {
          timeZone: "Asia/Manila",
        });
        document.getElementById("currentDateDisplay").textContent =
          new Date().toLocaleDateString("en-PH", {
            weekday: "long",
            month: "long",
            day: "numeric",
            year: "numeric",
          });
        const hour = new Date().getHours();
        document.getElementById("greetingText").textContent =
          hour < 12
            ? "Good Morning"
            : hour < 17
              ? "Good Afternoon"
              : "Good Evening";
        ALL_DATA = state.servicesByDate[today] || [];
        updateStats(ALL_DATA);
        drawTable(ALL_DATA);
      }

      function drawTable(data) {
        const tbody = document.querySelector("#receptTable tbody");
        tbody.innerHTML = "";
        data.sort((a, b) => a.start.localeCompare(b.start));

        data.forEach((item) => {
          const isArrived = item.status.toLowerCase() === "arrived";
          const n1d = String(item.n1d_status || "").toUpperCase();
          const n1h = String(item.n1h_status || "").toUpperCase();
          const dClass =
            n1d === "CONFIRMED"
              ? "conf-done"
              : n1d === "NO RESPONSE"
                ? "conf-nr"
                : "";
          const hClass =
            n1h === "CONFIRMED"
              ? "conf-done"
              : n1h === "NO RESPONSE"
                ? "conf-nr"
                : "";

          const row = document.createElement("tr");
          row.innerHTML = `
            <td><strong style="font-size:15px">${item.start}</strong></td>
            <td>
              <span class="plate-badge">${item.plate || item.csNo || "N/A"}</span>
              <span class="vehicle-model">${item.model}</span>
            </td>
            <td>
              <div class="customer-info">${item.lastName}</div>
              <div class="customer-sub">${item.contact || "N/A"}</div>
            </td>
            <td><div class="customer-sub" style="font-weight:600; color:#374151;">${item.advisor}</div></td>
            <td>
              <div class="conf-wrapper">
                <div class="conf-chip ${dClass}"><span>D</span>${n1d === "CONFIRMED" ? "OK" : n1d === "NO RESPONSE" ? "NR" : "—"}</div>
                <div class="conf-chip ${hClass}"><span>H</span>${n1h === "CONFIRMED" ? "OK" : n1h === "NO RESPONSE" ? "NR" : "—"}</div>
              </div>
            </td>
            <td style="text-align: right;">
              <div class="action-cell">
                ${
                  !isArrived
                    ? `
                  <div class="radio-grid">
                    <label class="radio-item selected" onclick="selectRadio(this)"><input type="radio" name="punct_${item.appointment_id}" value="On-Time" checked> On-Time</label>
                    <label class="radio-item" onclick="selectRadio(this)"><input type="radio" name="punct_${item.appointment_id}" value="Early"> Early</label>
                    <label class="radio-item" onclick="selectRadio(this)"><input type="radio" name="punct_${item.appointment_id}" value="Late"> Late</label>
                    <div style="visibility:hidden"></div>
                  </div>
                  <button class="btn-confirm-arrival" onclick="markArrived('${item.appointment_id}')">Confirm Arrival</button>
                `
                    : `<span style="color:var(--active-teal); font-weight:800; font-size:12px;">✓ ARRIVED</span>`
                }
              </div>
            </td>
          `;
          tbody.appendChild(row);
        });
      }

      function selectRadio(el) {
        const name = el.querySelector("input").name;
        document.querySelectorAll(`input[name="${name}"]`).forEach((input) => {
          input.parentElement.classList.remove("selected");
        });
        el.classList.add("selected");
        el.querySelector("input").checked = true;
      }

      function updateStats(data) {
        const arrived = data.filter(
          (x) => x.status.toLowerCase() === "arrived",
        ).length;
        document.getElementById("count-total").textContent = data.length;
        document.getElementById("count-arrived").textContent = arrived;
        document.getElementById("count-pending").textContent =
          data.length - arrived;
      }

      function filterList() {
        const query = document.getElementById("searchBox").value.toLowerCase();
        const filtered = ALL_DATA.filter(
          (x) =>
            (x.plate || "").toLowerCase().includes(query) ||
            (x.lastName || "").toLowerCase().includes(query) ||
            (x.csNo || "").toLowerCase().includes(query),
        );
        drawTable(filtered);
      }

      function markArrived(apptId) {
        const punctuality = document.querySelector(
          `input[name="punct_${apptId}"]:checked`,
        ).value;
        google.script.run
          .withSuccessHandler(() => {
            showToast();
            refreshData();
          })
          .setAppointmentArrived(apptId, punctuality);
      }

      function showToast() {
        const t = document.getElementById("toast");
        t.style.display = "block";
        setTimeout(() => (t.style.display = "none"), 3000);
      }

      refreshData();
      setInterval(refreshData, 60000);
    </script>
  </body>
</html>
